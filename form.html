<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Mama Guide - Form</title>
  <style>
    @font-face {
      font-family: "BFCMapleOrange";
      src: url("assets/BFCMapleOrange.otf") format("opentype");
      font-display: swap;
    }

    @font-face {
      font-family: "Carbonara Spaghetti";
      src: url("assets/Carbonara Spaghetti.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --pink: #FDAFB2;
      --mint: #CAE1D8;
      --cream: #FEE7C3;
      --text: #3f3a37;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--pink);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .page {
      padding: 24px 16px;
    }

    .header-box {
      max-width: 980px;
      margin: 0 auto;
      background: linear-gradient(135deg, var(--cream), #fff5e4);
      border: 4px solid var(--mint);
      border-radius: 18px;
      text-align: center;
      padding: 24px 20px 18px;
      box-shadow: 0 10px 24px rgba(63, 58, 55, 0.18);
    }

    .header-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .brand-title {
      margin: 0;
      font-family: "BFCMapleOrange", "Georgia", serif;
      font-size: clamp(2.8rem, 8.5vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: 0.04em;
      color: #7e5054;
    }

    .brand-subtitle {
      margin: 10px 0 0;
      font-family: "Carbonara Spaghetti", "Trebuchet MS", cursive;
      font-size: clamp(1.6rem, 4.6vw, 2.5rem);
      color: #4f6a60;
      letter-spacing: 0.03em;
    }

    .form-wrap {
      max-width: 980px;
      margin: 18px auto 0;
      background: rgba(254, 231, 195, 0.3);
      border: 2px dashed rgba(79, 106, 96, 0.4);
      border-radius: 16px;
      padding: 10px;
    }

    .quote-form {
      width: 100%;
      min-height: 1200px;
      border: none;
      display: block;
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="header-link" href="./index.html" aria-label="Back to home page">
      <header class="header-box">
        <h1 class="brand-title">mouse mama guide</h1>
        <p class="brand-subtitle">Best Day Ever Vacations by Jamie</p>
      </header>
    </a>
    <section class="form-wrap" aria-label="Free quote form">
      <iframe
        class="quote-form"
        src="https://travefy.com/f/6ws9rqqada2qra2uwxzxg6wwx278z959s2"
        title="Free Quote Form"
        loading="lazy">
      </iframe>
    </section>
  </div>
  <script>
    window.addEventListener("pageshow", () => {
      window.scrollTo(0, 0);
    });
  </script>
</body>
</html>
